<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏结果 - 今天吃什么？</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #FFF8F0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .result-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .share-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 24px;
            color: #FF6B35;
        }

        .result-emoji {
            font-size: 64px;
            margin-bottom: 12px;
        }

        /* Score Progress */
        .score-section {
            width: 100%;
            max-width: 300px;
            margin-bottom: 16px;
        }
        .score-label {
            font-size: 14px;
            color: #888;
        }
        .score-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .score-progress {
            flex: 1;
            height: 8px;
            background: rgba(255,107,53,0.15);
            border-radius: 4px;
            overflow: hidden;
        }
        .score-progress-fill {
            height: 100%;
            background: #FF6B35;
            width: 85%;
        }
        .score-percent {
            font-size: 14px;
            font-weight: bold;
            color: #FF6B35;
        }

        .result-reason {
            font-size: 18px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Main Result Card */
        .result-card {
            width: 100%;
            max-width: 300px;
            background: #FF6B35;
            border-radius: 20px;
            padding: 28px 20px;
            box-shadow: 0 4px 12px rgba(255,107,53,0.3);
            margin-bottom: 16px;
        }
        .result-shop {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-align: center;
        }

        /* Alternatives */
        .alternatives-section {
            width: 100%;
            max-width: 300px;
            margin-bottom: 24px;
        }
        .alternatives-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 6px;
        }
        .alternatives-list {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .alternative-tag {
            background: #E0E0E0;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 14px;
        }

        /* XP Card */
        .xp-card {
            width: 100%;
            max-width: 300px;
            background: rgba(255,193,7,0.15);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 40px;
        }
        .xp-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .xp-item {
            text-align: center;
        }
        .xp-value {
            font-size: 24px;
            font-weight: bold;
            color: #FFC107;
        }
        .xp-label {
            font-size: 14px;
        }
        .level-value {
            font-size: 24px;
            font-weight: bold;
            color: #FF6B35;
        }

        /* Play Again Button */
        .play-again-btn {
            width: 100%;
            max-width: 300px;
            height: 56px;
            border-radius: 28px;
            border: none;
            background: #FF6B35;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .play-again-btn:hover {
            transform: scale(1.02);
        }

        /* Achievement Dialog */
        .achievement-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 20px;
            padding: 32px;
            min-width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
            display: none;
            z-index: 100;
        }
        .achievement-dialog.visible {
            display: block;
        }
        .achievement-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .achievement-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .achievement-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }
        .achievement-xp {
            font-size: 18px;
            color: #FFC107;
        }
        .achievement-close {
            margin-top: 16px;
            padding: 8px 24px;
            border-radius: 8px;
            border: none;
            background: #FF6B35;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="share-btn" onclick="shareResult()">📤</button>

    <div class="result-container">
        <div class="result-emoji">🎉</div>

        <!-- Score Progress -->
        <div class="score-section">
            <span class="score-label">本局得分</span>
            <div class="score-bar">
                <div class="score-progress">
                    <div class="score-progress-fill"></div>
                </div>
                <span class="score-percent">85%</span>
            </div>
        </div>

        <div class="result-reason">恭喜！根据你的表现</div>

        <!-- Main Result Card -->
        <div class="result-card">
            <div class="result-shop">海底捞火锅 🍲</div>
        </div>

        <!-- Alternatives -->
        <div class="alternatives-section">
            <span class="alternatives-label">其他备选</span>
            <div class="alternatives-list">
                <span class="alternative-tag">必胜客</span>
                <span class="alternative-tag">肯德基</span>
                <span class="alternative-tag">麦当劳</span>
            </div>
        </div>

        <!-- XP Card -->
        <div class="xp-card">
            <div class="xp-row">
                <div class="xp-item">
                    <div class="xp-value">+50</div>
                    <div class="xp-label">XP 获得</div>
                </div>
                <div class="xp-item">
                    <div class="level-value">Lv.5</div>
                    <div class="xp-label">当前等级</div>
                </div>
            </div>
        </div>

        <!-- Play Again Button -->
        <button class="play-again-btn" onclick="playAgain()">再来一次</button>
    </div>

    <!-- Achievement Dialog -->
    <div class="achievement-dialog visible" id="achievementDialog">
        <div class="achievement-icon">🏆</div>
        <div class="achievement-title">连胜达人</div>
        <div class="achievement-desc">连续获得5次85%以上分数</div>
        <div class="achievement-xp">奖励: +100 XP</div>
        <button class="achievement-close" onclick="closeAchievement()">太棒了！</button>
    </div>

    <script>
        function shareResult() {
            alert('分享结果到社交平台');
        }

        function playAgain() {
            alert('开始新游戏');
        }

        function closeAchievement() {
            document.getElementById('achievementDialog').classList.remove('visible');
        }
    </script>
</body>
</html>
